<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Fond cercle or -->
  <defs>
    <radialGradient id="coinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a1a"/>
    </radialGradient>
    <radialGradient id="innerGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5dfa0"/>
      <stop offset="100%" stop-color="#b8952e"/>
    </radialGradient>
  </defs>

  <!-- Ombre douce -->
  <ellipse cx="103" cy="104" rx="88" ry="88" fill="rgba(0,0,0,0.18)"/>

  <!-- Cercle principal (la pièce) -->
  <circle cx="100" cy="100" r="88" fill="url(#coinGrad)"/>

  <!-- Bord relief extérieur -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#7a5a10" stroke-width="3" opacity="0.5"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#f5e090" stroke-width="1.5" opacity="0.6"/>

  <!-- Zone intérieure -->
  <circle cx="100" cy="100" r="72" fill="url(#innerGrad)"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#8a6a1a" stroke-width="1.5" opacity="0.4"/>

  <!-- Perles décoratives sur le bord -->
  <g fill="#8a6a1a" opacity="0.5">
    <circle cx="100" cy="16"  r="2.5"/>
    <circle cx="127" cy="21"  r="2.5"/>
    <circle cx="150" cy="36"  r="2.5"/>
    <circle cx="166" cy="58"  r="2.5"/>
    <circle cx="173" cy="83"  r="2.5"/>
    <circle cx="171" cy="109" r="2.5"/>
    <circle cx="161" cy="133" r="2.5"/>
    <circle cx="143" cy="153" r="2.5"/>
    <circle cx="121" cy="165" r="2.5"/>
    <circle cx="96"  cy="168" r="2.5"/>
    <circle cx="71"  cy="163" r="2.5"/>
    <circle cx="49"  cy="150" r="2.5"/>
    <circle cx="32"  cy="131" r="2.5"/>
    <circle cx="22"  cy="108" r="2.5"/>
    <circle cx="19"  cy="83"  r="2.5"/>
    <circle cx="25"  cy="58"  r="2.5"/>
    <circle cx="40"  cy="37"  r="2.5"/>
    <circle cx="63"  cy="21"  r="2.5"/>
  </g>

  <!-- Icône pièce centrale -->
  <text x="100" y="90" text-anchor="middle" font-size="42" fill="#7a5a10" opacity="0.7">🪙</text>

  <!-- Texte -->
  <text x="100" y="128" text-anchor="middle"
        font-family="Georgia, serif" font-size="13"
        font-weight="bold" fill="#6a4a08" letter-spacing="2" opacity="0.8">MONETA</text>

  <text x="100" y="148" text-anchor="middle"
        font-family="Georgia, serif" font-size="9"
        fill="#8a6a1a" letter-spacing="1" opacity="0.6" font-style="italic">image non disponible</text>
</svg>
