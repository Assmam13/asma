<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="logo.png" alt="Moneta Logo" class="login-logo">
      <h2>Mot de passe oublié</h2>
      <p>Entrez votre e-mail pour réinitialiser votre mot de passe.</p>
    </div>

    <form>
      <div class="form-group">
        <label for="email">Adresse E-mail</label>
        <input type="email" id="email" placeholder="nom@exemple.com" required>
      </div>
      <button type="submit" class="login-button">Réinitialiser</button>
    </form>

    <div class="login-footer">
      <a routerLink="/login" class="red-link">Retour à la connexion</a>
    </div>
  </div>
</div>
