<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <img src="logo.png" alt="Moneta Logo" class="login-logo" onerror="this.style.display='none'">
      <h2>Connexion à Moneta</h2>
      <p>Veuillez entrer vos identifiants pour accéder à votre espace.</p>
    </div>

    <!-- Message d'erreur -->
    @if (erreur) {
      <div class="erreur-message">
        ⚠️ {{ erreur }}
      </div>
    }

    <form (ngSubmit)="seConnecter()">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          type="text"
          id="username"
          placeholder="Votre nom d'utilisateur"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"/>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"/>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox"> Se souvenir de moi
        </label>
        <a routerLink="/forgot-password" class="red-link">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="login-button" [disabled]="chargement">
        @if (chargement) {
          ⏳ Connexion en cours...
        } @else {
          Se connecter
        }
      </button>
    </form>

    <div class="login-footer">
      <p>Vous n'avez pas de compte ?
        <a routerLink="/request" class="red-link">Demander l'accès</a>
      </p>
      <a routerLink="/" class="back-home">← Retour à l'accueil</a>
    </div>

  </div>
</div>
