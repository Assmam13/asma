# ============================================================
# application.properties — MONETA Backend
# HTTPS avec certificat auto-signé (développement Windows)
# ============================================================

# ── Serveur HTTPS ────────────────────────────────────────────
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=moneta2025
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=moneta

# ── Redirection HTTP → HTTPS ─────────────────────────────────
# Si quelqu'un tape http://localhost:8080, il sera redirigé vers https://localhost:8443
server.http.port=8080

# ── Base de données MariaDB ──────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3306/moneta_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=moneta_secret_key_2025_pfe_fsegn_carthage
jwt.expiration=86400000
